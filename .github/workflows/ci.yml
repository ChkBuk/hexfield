name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-audit:
    name: Build + Lighthouse budget
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (astro check)
        run: npm run typecheck

      - name: Build site
        run: npm run build

      - name: Smoke-check critical artifacts exist
        run: |
          set -e
          OUT=.vercel/output/static
          for f in \
            "$OUT/index.html" \
            "$OUT/sitemap-index.xml" \
            "$OUT/robots.txt" \
            "$OUT/rss.xml" \
            "$OUT/services/index.html" \
            "$OUT/portfolio/index.html" \
            "$OUT/about/index.html" \
            "$OUT/contact/index.html" \
            "$OUT/blog/index.html" \
            "$OUT/privacy/index.html" \
            "$OUT/terms/index.html" \
            "$OUT/cookies/index.html"
          do
            test -f "$f" || { echo "❌ $f missing"; exit 1; }
          done
          echo "✅ all critical artifacts present"

      - name: Check internal links (no 404 hrefs in build output)
        run: node scripts/check-internal-links.mjs .vercel/output/static

      - name: Verify per-page JSON-LD blocks
        run: |
          set -e
          OUT=.vercel/output/static
          home_ld=$(grep -o 'application/ld+json' "$OUT/index.html" | wc -l)
          svc_ld=$(grep -o 'application/ld+json' "$OUT/services/index.html" | wc -l)
          port_ld=$(grep -o 'application/ld+json' "$OUT/portfolio/index.html" | wc -l)
          echo "Home JSON-LD blocks:      $home_ld (expect ≥ 3)"
          echo "Services JSON-LD blocks:  $svc_ld (expect ≥ 3)"
          echo "Portfolio JSON-LD blocks: $port_ld (expect ≥ 3)"
          [ "$home_ld" -ge 3 ] || { echo "❌ home JSON-LD short"; exit 1; }
          [ "$svc_ld"  -ge 3 ] || { echo "❌ services JSON-LD short"; exit 1; }
          [ "$port_ld" -ge 3 ] || { echo "❌ portfolio JSON-LD short"; exit 1; }

      - name: Serve dist + Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
